openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CareConnect API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: doctors
    description: Doctor operations
  - name: appointments
    description: Appointment operations
  - name: stats
    description: Statistics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List all doctors
      parameters:
        - name: specialty
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get doctor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "404":
          description: Not found

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List all appointments
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found

    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Cancel/delete an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Appointment deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Doctor:
      type: object
      required: [id, name, specialty, rating, reviewCount, experience, fee, available, imageUrl, bio]
      properties:
        id:
          type: integer
        name:
          type: string
        specialty:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        experience:
          type: integer
        fee:
          type: number
        available:
          type: boolean
        imageUrl:
          type: string
        bio:
          type: string
        location:
          type: string

    AppointmentInput:
      type: object
      required: [doctorId, doctorName, specialty, date, time, fee]
      properties:
        doctorId:
          type: integer
        doctorName:
          type: string
        specialty:
          type: string
        date:
          type: string
        time:
          type: string
        fee:
          type: number
        notes:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        date:
          type: string
        time:
          type: string
        notes:
          type: string

    Appointment:
      type: object
      required: [id, doctorId, doctorName, specialty, date, time, fee, status, paymentStatus]
      properties:
        id:
          type: integer
        doctorId:
          type: integer
        doctorName:
          type: string
        specialty:
          type: string
        date:
          type: string
        time:
          type: string
        fee:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        paymentStatus:
          type: string
          enum: [paid, unpaid]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    Stats:
      type: object
      required: [doctorCount, patientCount, appointmentCount, satisfactionRate]
      properties:
        doctorCount:
          type: integer
        patientCount:
          type: integer
        appointmentCount:
          type: integer
        satisfactionRate:
          type: number
