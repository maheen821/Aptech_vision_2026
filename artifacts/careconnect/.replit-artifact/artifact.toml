kind = "web"
previewPath = "/"
title = "CareConnect"
version = "1.0.0"
id = "artifacts/careconnect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25089

[services.development]
run = "pnpm --filter @workspace/careconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/careconnect", "run", "build" ]
publicDir = "artifacts/careconnect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25089"
BASE_PATH = "/"
